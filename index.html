<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Skleník</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #050705;    /* Takmer úplná čierna */
  --surface:    #0a0f0b;    /* Veľmi tmavá zelená pre panely */
  --surface2:   #121a13;
  --border:     #1a261c;
  --border-hi:  #2d4030;
  --text:       #a0b0a0;    /* Mierne tlmená biela/zelená */
  --text-hi:    #e0f0e0;
  --green:      #2d5c3a;    /* Tmavšia funkčná zelená */
  --green-hi:   #4ade80;    /* Jasná zelená pre akcenty */
  --red:        #7f1d1d;
  --red-hi:     #ef4444;
  --radius:     2px;        /* Ostrejšie rohy pre tech vzhľad */
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace; /* Iba monospace */
  font-size: 13px;
  line-height: 1.6;
}

/* Jemný scanline efekt pre tech feeling */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
              linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
  background-size: 100% 4px, 3px 100%;
  pointer-events: none;
  z-index: 10;
}

.shell {
  max-width: 1400px; /* Širší layout */
  margin: 0 auto;
  padding: 40px;
}

/* ── HEADER ── */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
  padding-bottom: 20px;
  border-bottom: 2px solid var(--border);
}

.brand-name {
  font-size: 24px;
  font-weight: 700;
  color: var(--green-hi);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
}

/* ── SENSOR GRID ── */
.sensor-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 20px;
}

.sensor-cell {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 20px;
  position: relative;
}

.sensor-label {
  font-size: 10px;
  color: var(--green-hi);
  margin-bottom: 10px;
  text-transform: uppercase;
}

.sensor-value {
  font-size: 32px;
  font-weight: bold;
  color: var(--text-hi);
}

/* ── LAYOUT 2-COL ── */
.main-grid {
  display: grid;
  grid-template-columns: 1fr 350px;
  gap: 20px;
}

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  margin-bottom: 20px;
}

.panel-head {
  padding: 10px 15px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  color: var(--green-hi);
}

.panel-body { padding: 20px; }

/* ── CHART ── */
.chart-wrap { height: 350px; } /* Vyšší graf */

/* ── BUTTONS & CONTROLS ── */
.controls-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1px;
  background: var(--border);
}

.ctrl { background: var(--surface); padding: 15px; }

.btn {
  flex: 1;
  padding: 8px;
  background: transparent;
  border: 1px solid var(--border-hi);
  color: var(--text);
  font-family: inherit;
  cursor: pointer;
  transition: all 0.1s;
}

.btn.on { background: var(--green); color: white; border-color: var(--green-hi); }
.btn.off { background: var(--red); color: white; border-color: var(--red-hi); }
.btn:active { transform: scale(0.98); }

input[type=range] {
  width: 100%;
  accent-color: var(--green-hi);
}

.log-list { font-size: 11px; max-height: 400px; overflow-y: auto; }
.log-row { border-bottom: 1px solid var(--border); padding: 5px 0; }
.log-t { color: var(--green-hi); margin-right: 10px; }

@media (max-width: 1000px) {
  .main-grid { grid-template-columns: 1fr; }
  .sensor-strip { grid-template-columns: repeat(2, 1fr); }
}
</style>
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="brand">
      <div class="brand-name">Skleník_OS v1.0</div>
    </div>
    <div class="header-right">
      <div class="status-pill">
        <div class="pulse" id="status-dot"></div>
        <span id="status-txt">SYSTEM_OFFLINE</span>
        <span id="last-seen" style="margin-left: 10px; opacity: 0.5;"></span>
      </div>
    </div>
  </header>

  <div class="sensor-strip">
    <div class="sensor-cell">
      <div class="sensor-label">Soil_Moisture</div>
      <div class="sensor-value" id="val-soil">--%</div>
    </div>
    <div class="sensor-cell">
      <div class="sensor-label">Air_Temp</div>
      <div class="sensor-value" id="val-temp">--°C</div>
    </div>
    <div class="sensor-cell">
      <div class="sensor-label">Air_Humidity</div>
      <div class="sensor-value" id="val-hum">--%</div>
    </div>
    <div class="sensor-cell">
      <div class="sensor-label">Water_Level</div>
      <div class="sensor-value" id="val-water">--%</div>
    </div>
  </div>

  <div class="main-grid">
    <div class="content-left">
      <div class="panel">
        <div class="panel-head">HISTORICAL_DATA_STREAM</div>
        <div class="panel-body">
          <div class="chart-wrap">
            <canvas id="chart"></canvas>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">SYSTEM_CONTROLS</div>
        <div class="controls-grid">
           <div class="ctrl">
             <div class="sensor-label">Pump_Module</div>
             <div class="toggle-row" style="display:flex; gap:5px; margin-bottom:10px;">
               <button class="btn" id="btn-pump-on" onclick="cmdPump(true)">START</button>
               <button class="btn" id="btn-pump-off" onclick="cmdPump(false)">STOP</button>
             </div>
             <input type="range" min="10" max="100" value="100" id="pump-speed-slider">
           </div>
           <div class="ctrl">
             <div class="sensor-label">Fan_Module</div>
             <div class="toggle-row" style="display:flex; gap:5px; margin-bottom:10px;">
               <button class="btn" id="btn-fan-on" onclick="cmdFan(true)">START</button>
               <button class="btn" id="btn-fan-off" onclick="cmdFan(false)">STOP</button>
             </div>
             <input type="range" min="10" max="100" value="80" id="fan-speed-slider">
           </div>
           <div class="ctrl">
              <div class="sensor-label">Light_Array</div>
              <div class="toggle-row" style="display:flex; gap:5px; margin-bottom:10px;">
                <button class="btn" id="btn-led-on" onclick="cmdLed(true,0,150,80)">ON</button>
                <button class="btn" id="btn-led-off" onclick="cmdLed(false,0,0,0)">OFF</button>
              </div>
              <input type="range" min="5" max="30" value="20" id="brightness-slider">
           </div>
           <div class="ctrl">
              <div class="sensor-label">Logic_Auto</div>
              <div class="toggle-row" style="display:flex; gap:5px;">
                <button class="btn" id="btn-auto-on" onclick="cmdAuto(true)">ENABLE</button>
                <button class="btn" id="btn-auto-off" onclick="cmdAuto(false)">DISABLE</button>
              </div>
           </div>
        </div>
      </div>
    </div>

    <div class="content-right">
      <div class="panel">
        <div class="panel-head">EVENT_LOG</div>
        <div class="panel-body">
          <div class="log-list" id="log-list">
            <div class="log-row">Initializing...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /shell -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// Nastav tu URL svojho Azure App Service po deployi:
// napr. 'https://smart-sklenik.azurewebsites.net'
// Prázdny reťazec = ten istý server (funguje keď sa servuje z FastAPI)
const API = '';

// ── Chart ──
const chart = new Chart(document.getElementById('chart').getContext('2d'), {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      { label: 'Temp (°C)', data: [], borderColor: '#ef4444', tension: 0.3, pointRadius: 0, borderWidth: 2 },
      { label: 'Soil (%)', data: [], borderColor: '#4ade80', tension: 0.3, pointRadius: 0, borderWidth: 2 },
      { label: 'Hum (%)', data: [], borderColor: '#3b82f6', tension: 0.3, pointRadius: 0, borderWidth: 2 },
      { label: 'Water (%)', data: [], borderColor: '#f59e0b', tension: 0.3, pointRadius: 0, borderWidth: 2 }
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { labels: { color: '#a0b0a0', font: { family: 'DM Mono' } } } },
    scales: {
      x: { grid: { color: '#1a261c' }, ticks: { color: '#555' } },
      y: { grid: { color: '#1a261c' }, ticks: { color: '#555' } }
    }
  }
});

// ── UI update ──
function updateUI(data) {
  const s = data.sensors;

  // Sensor values
  set('val-soil',  s.soilPct  + '%');
  set('val-temp',  s.temp     + '°C');
  set('val-hum',   s.humidity + '%');
  set('val-water', s.waterPct + '%');

  barW('bar-soil',  s.soilPct);
  barW('bar-temp',  Math.min(s.temp * 2, 100));
  barW('bar-hum',   s.humidity);
  barW('bar-water', s.waterPct);

  set('sub-soil', s.soilDesc || (s.soilPct < 40 ? 'suchá – potrebuje vodu' : s.soilPct < 70 ? 'optimálna vlhkosť' : 'mokrá'));
  set('sub-water', s.waterLow ? '⚠ nízka hladina!' : 'nádoba čerpadla');
  document.getElementById('bar-water').style.background = s.waterLow ? 'var(--red-hi)' : 'var(--green)';
  set('sub-temp', s.temp > 28 ? '↑ nad prahom (28°C)' : 'vzuch v skleníku');

  // Online
  const dot = document.getElementById('status-dot');
  dot.className = 'pulse' + (data.online ? ' online' : '');
  set('status-txt', data.online ? 'online' : 'offline');
  if (data.last_seen) {
    const d = new Date(data.last_seen);
    set('last-seen', 'posl. ' + d.toLocaleTimeString('sk-SK'));
  }

  // Buttons
  syncBtn('btn-pump-on', 'btn-pump-off', s.pump);
  syncBtn('btn-fan-on',  'btn-fan-off',  s.fan);
  syncBtn('btn-led-on',  'btn-led-off',  s.led);
  syncBtn('btn-auto-on', 'btn-auto-off', s.auto);

  if (s.pumpSpeed != null) {
    document.getElementById('pump-speed-slider').value = s.pumpSpeed;
    set('pump-spd-val', s.pumpSpeed + '%');
  }

  // Badges
  badge('badge-pump',  s.pump,     'čerpadlo beží', 'čerpadlo vyp');
  badge('badge-fan',   s.fan,      'ventilátor beží','ventilátor vyp');
  badge('badge-led',   s.led,      'LED zap',        'LED vyp');
  badge('badge-auto',  s.auto,     'auto zap',       'auto vyp');
  badgeWarn('badge-water', s.waterLow, '⚠ nízka voda', 'voda ok');

  // Log
  if (data.status_log && data.status_log.length) {
    document.getElementById('log-list').innerHTML =
      data.status_log.slice().reverse().map(e => {
        const t = new Date(e.time).toLocaleTimeString('sk-SK');
        return `<div class="log-row"><span class="log-t">${t}</span><span class="log-m">${e.status}</span></div>`;
      }).join('');
  }
}

function set(id, v) { const el = document.getElementById(id); if (el) el.textContent = v; }
function barW(id, pct) { const el = document.getElementById(id); if (el) el.style.width = pct + '%'; }

function syncBtn(onId, offId, isOn) {
  const on  = document.getElementById(onId);
  const off = document.getElementById(offId);
  if (!on || !off) return;
  on.className  = 'btn' + (isOn  ? ' on'  : '');
  off.className = 'btn' + (!isOn ? ' off' : '');
}

function badge(id, active, txtOn, txtOff) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'badge' + (active ? ' active' : '');
  el.textContent = active ? txtOn : txtOff;
}

function badgeWarn(id, warn, txtWarn, txtOk) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'badge' + (warn ? ' warn' : '');
  el.textContent = warn ? txtWarn : txtOk;
}

function updateChart(history) {
  if (!history || !history.length) return;
  const last = history.slice(-30);
  chart.data.labels = last.map(h => new Date(h.time).toLocaleTimeString('sk-SK', {hour:'2-digit',minute:'2-digit'}));
  
  chart.data.datasets[0].data = last.map(h => h.temp);
  chart.data.datasets[1].data = last.map(h => h.soilPct);
  chart.data.datasets[2].data = last.map(h => h.humidity);
  chart.data.datasets[3].data = last.map(h => h.waterPct);
  
  chart.update();
}

// ── Fetch ──
async function fetchState() {
  try {
    const r = await fetch(API + '/api/state');
    updateUI(await r.json());
  } catch { document.getElementById('status-dot').className = 'pulse'; }
}

async function fetchHistory() {
  try {
    const r = await fetch(API + '/api/history');
    updateChart((await r.json()).history);
  } catch {}
}

// ── Commands ──
async function cmdLed(on, r, g, b) {
  // OKAMŽITÁ ZMENA tlačidiel zap/vyp
  syncBtn('btn-led-on', 'btn-led-off', on);
  
  const br = parseInt(document.getElementById('brightness-slider').value);
  try {
    await fetch(API + `/api/led?on=${on}&r=${r}&g=${g}&b=${b}&brightness=${br}`, { method:'POST' });
    setTimeout(fetchState, 1000);
  } catch (e) {
    console.error("Chyba LED:", e);
    fetchState();
  }
}
async function cmdPump(on) {
  // OKAMŽITÁ ZMENA: prepneme tlačidlá hneď, nečakáme na server
  syncBtn('btn-pump-on', 'btn-pump-off', on);
  
  const spd = parseInt(document.getElementById('pump-speed-slider').value);
  try {
    await fetch(API + `/api/pump?on=${on}&speed=${spd}`, { method:'POST' });
    // Počkáme sekundu, kým skontrolujeme reálny stav z ESP32
    setTimeout(fetchState, 1000);
  } catch (e) {
    console.error("Chyba pumpy:", e);
    fetchState(); // Ak to zlyhalo, vráti pôvodný stav zo servera
  }
}
async function cmdFan(on) {
  // OKAMŽITÁ ZMENA
  syncBtn('btn-fan-on', 'btn-fan-off', on);
  
  const spd = parseInt(document.getElementById('fan-speed-slider').value);
  try {
    await fetch(API + `/api/fan?on=${on}&speed=${spd}`, { method:'POST' });
    setTimeout(fetchState, 1000);
  } catch (e) {
    console.error("Chyba ventilátora:", e);
    fetchState();
  }
}
async function cmdAuto(on) {
  // OKAMŽITÁ ZMENA
  syncBtn('btn-auto-on', 'btn-auto-off', on);
  
  try {
    await fetch(API + `/api/auto?on=${on}`, { method:'POST' });
    setTimeout(fetchState, 1000);
  } catch (e) {
    console.error("Chyba Auto-režimu:", e);
    fetchState();
  }
}

fetchState();
fetchHistory();
setInterval(fetchState, 3000);
setInterval(fetchHistory, 15000);
</script>
</body>
</html>
